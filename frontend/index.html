<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Procedural Map Renderer</title>
    <link rel="stylesheet" href="stylesheets/base.css">
    <link rel="stylesheet" href="stylesheets/buttons.css">
    <link rel="stylesheet" href="stylesheets/tilemap.css">
    <link rel="stylesheet" href="stylesheets/info-panel.css">
</head>

<body>
    <div class="controls">
        <button id="zoomInBtn" title="Zoom In">+</button>
        <button id="zoomOutBtn" title="Zoom Out">-</button>
    </div>

    <div class="left-controls">
        <button id="infoToggleBtn" title="Toggle Info">≡</button>
    </div>

    <div class="info-panel" id="infoPanel">
        <h2>Tile Info</h2>
        <h3 id="infoTileType" style="margin-top: 0; color: #fff;">Hover over a tile</h3>
        <div id="infoTileDisplay"></div>
        <p id="infoTileValue" style="color: #ccc; font-family: monospace; font-size: 14px;"></p>
    </div>

    <div id="mapContainer">
        <canvas id="mapCanvas"></canvas>
    </div>

    <script src="scripts/tilemap.js" type="module"></script>
    <script src="scripts/info-panel.js" type="module"></script>
    <script src="scripts/tile-type.js" type="module"></script>
</body>

</html>
